<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /var/www/html/web
    <Directory /var/www/html/web>
        AllowOverride None
        Require all granted
        FallbackResource /app.php
    </Directory>

    ErrorLog /var/log/apache2/st1995-app_error.log
    CustomLog /var/log/apache2/st1995-app_access.log combined
</VirtualHost>

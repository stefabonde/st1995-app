name: Build and Deploy st1995-app

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Calcolo dinamico in base al branch
      DEPLOY_PATH: ${{ github.ref_name == 'main' && '/var/www/production/st1995-app-prod' || '/var/www/staging/st1995-app' }}
      HOST_PORT: ${{ github.ref_name == 'main' && '8085' || '8084' }}
      ENV_SUFFIX: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      NETWORK_NAME: ${{ github.ref_name == 'main' && 'manualswebapp-prod_manualsnet' || 'manualswebapp_manualsnet' }}
      DB_CONTAINER_NAME: ${{ github.ref_name == 'main' && 'manualswebapp-db-prod' || 'manualswebapp-db-staging' }}
      
      # Secrets dinamici in base al branch
      DB_NAME: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_NAME || secrets.STAGING_DATABASE_NAME }}
      DB_USER: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_USER || secrets.STAGING_DATABASE_USER }}
      DB_PASS: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_PASSWORD || secrets.STAGING_DATABASE_PASSWORD }}
      JWT_SECRET: ${{ github.ref_name == 'main' && secrets.PROD_JWT_SECRET || secrets.STAGING_JWT_SECRET }}

    steps:
    - uses: actions/checkout@v3

    # Nessuna build NPM/Node.js in questo progetto
    
    # 1. Upload Docker config to root
    - name: Deploy Docker Config
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: "docker-compose.yml,Dockerfile,.dockerignore,vhost.conf"
        target: ${{ env.DEPLOY_PATH }}

    # 2. Upload App Code
    - name: Deploy App Code
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: "./"
        target: ${{ env.DEPLOY_PATH }}
        strip_components: 0

    # 3. Create parameters.yml and .env on the server
    - name: Create configurations
      uses: appleboy/ssh-action@master
      env:
        DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        HOST_PORT: ${{ env.HOST_PORT }}
        ENV_SUFFIX: ${{ env.ENV_SUFFIX }}
        NETWORK_NAME: ${{ env.NETWORK_NAME }}
        DB_CONTAINER_NAME: ${{ env.DB_CONTAINER_NAME }}
        DB_NAME: ${{ env.DB_NAME }}
        DB_USER: ${{ env.DB_USER }}
        DB_PASS: ${{ env.DB_PASS }}
        JWT_SECRET: ${{ env.JWT_SECRET }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: DEPLOY_PATH,HOST_PORT,ENV_SUFFIX,NETWORK_NAME,DB_CONTAINER_NAME,DB_NAME,DB_USER,DB_PASS,JWT_SECRET
        script: |
          mkdir -p $DEPLOY_PATH/app/config
          
          # Symfony parameters
          cat <<EOF > $DEPLOY_PATH/app/config/parameters.yml
          parameters:
              database_host: $DB_CONTAINER_NAME
              database_port: 3306
              database_name: $DB_NAME
              database_user: $DB_USER
              database_password: $DB_PASS
              mailer_transport: smtp
              mailer_host: 127.0.0.1
              mailer_user: null
              mailer_password: null
              secret: $JWT_SECRET
              mail_address: info@example.com
              mail_sender: Store
              site_name: Store
          EOF
          chmod 644 $DEPLOY_PATH/app/config/parameters.yml
          
          # Docker-compose .env
          cat <<EOF > $DEPLOY_PATH/.env
          COMPOSE_PROJECT_NAME=st1995app-$ENV_SUFFIX
          DATABASE_NAME=$DB_NAME
          DATABASE_USER=$DB_USER
          DATABASE_PASSWORD=$DB_PASS
          HOST_PORT=$HOST_PORT
          ENV_SUFFIX=$ENV_SUFFIX
          NETWORK_NAME=$NETWORK_NAME
          EOF
          sed -i 's/^[ \t]*//' $DEPLOY_PATH/.env

    # 4. Restart containers & clear cache
    - name: Restart
      uses: appleboy/ssh-action@master
      env:
        DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: DEPLOY_PATH
        script: |
          cd $DEPLOY_PATH
          if docker compose version >/dev/null 2>&1; then
            DOCKER_CMD="docker compose"
          else
            DOCKER_CMD="docker-compose"
          fi
          $DOCKER_CMD up -d --build app
          # Install bundle assets & clear cache
          $DOCKER_CMD exec -T app php bin/console assets:install web --env=prod || true
          $DOCKER_CMD exec -T app php bin/console cache:clear --env=prod --no-debug || true
          $DOCKER_CMD exec -T app chown -R www-data:www-data var/cache var/logs var/sessions web/uploads || true
